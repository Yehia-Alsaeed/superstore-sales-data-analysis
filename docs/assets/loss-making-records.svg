<svg xmlns="http://www.w3.org/2000/svg" width="820" height="390" viewBox="0 0 820 390" role="img" aria-labelledby="title desc">
<title id="title">Loss-Making Records Share</title>
<desc id="desc">Stacked bar showing the share of cleaned records with negative profit.</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="40" y="46" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2933">Loss-Making Records Share</text>
<text x="40" y="74" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#52616b">Negative-profit records in the cleaned Superstore dataset</text>
<text x="40" y="122" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="800" fill="#9f2d2d">7.22%</text>
<text x="178" y="122" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#52616b">489 of 6,777 cleaned records had negative profit.</text>
<rect x="60" y="162" width="700" height="42" rx="7" fill="#2f6f4e"/>
<rect x="60" y="162" width="50.5" height="42" rx="7" fill="#b94a48"/>
<line x1="110.5" y1="162" x2="110.5" y2="204" stroke="#ffffff" stroke-width="2"/>
<text x="60" y="238" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#9f2d2d">Loss-making: 7.22%</text>
<text x="760" y="238" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#2f6f4e">Non-loss: 92.78%</text>
<text x="40" y="325" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">Insight: Loss-making records are a minority, but they should be reviewed alongside discounting and product category margins.</text>
</svg>